<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👨‍👩‍👧‍👦 亲戚称呼计算器</title>
<style>
:root {
  --bg: #f8f9fa;
  --bg-card: #ffffff;
  --bg-input: #f1f3f5;
  --text: #212529;
  --text-secondary: #6c757d;
  --text-muted: #adb5bd;
  --border: #dee2e6;
  --primary: #4c6ef5;
  --primary-hover: #3b5bdb;
  --primary-light: #e7ecfe;
  --accent: #f06595;
  --accent-light: #fde8ef;
  --success: #40c057;
  --warning: #fab005;
  --danger: #fa5252;
  --shadow: 0 2px 8px rgba(0,0,0,.08);
  --shadow-lg: 0 4px 16px rgba(0,0,0,.12);
  --radius: 12px;
  --radius-sm: 8px;
  --transition: .2s ease;
}
[data-theme="dark"] {
  --bg: #1a1b1e;
  --bg-card: #25262b;
  --bg-input: #2c2e33;
  --text: #e9ecef;
  --text-secondary: #adb5bd;
  --text-muted: #6c757d;
  --border: #373a40;
  --primary: #748ffc;
  --primary-hover: #5c7cfa;
  --primary-light: #25262b;
  --accent: #f06595;
  --accent-light: #2c1a23;
  --shadow: 0 2px 8px rgba(0,0,0,.3);
  --shadow-lg: 0 4px 16px rgba(0,0,0,.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  transition: background .3s, color .3s;
}

.container { max-width: 640px; margin: 0 auto; padding: 16px; }

/* Header */
.header {
  text-align: center;
  padding: 24px 0 16px;
}
.header h1 {
  font-size: 1.6rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header p {
  color: var(--text-secondary);
  font-size: .875rem;
  margin-top: 4px;
}

/* Theme toggle */
.theme-toggle {
  position: fixed;
  top: 16px;
  right: 16px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text);
  cursor: pointer;
  font-size: 1.2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow);
  transition: var(--transition);
  z-index: 100;
}
.theme-toggle:hover { background: var(--bg-input); transform: scale(1.05); }

/* Gender selector */
.gender-selector {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.gender-selector .label {
  font-size: .875rem;
  color: var(--text-secondary);
  margin-bottom: 8px;
  font-weight: 500;
}
.gender-buttons {
  display: flex;
  gap: 12px;
}
.gender-btn {
  flex: 1;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  border: 2px solid var(--border);
  background: var(--bg-card);
  color: var(--text);
  cursor: pointer;
  font-size: 1rem;
  font-weight: 500;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.gender-btn:hover { border-color: var(--primary); background: var(--primary-light); }
.gender-btn.active {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
  font-weight: 600;
}

/* Breadcrumb */
.breadcrumb {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 4px;
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  min-height: 44px;
  font-size: .9rem;
}
.breadcrumb .step {
  padding: 4px 10px;
  border-radius: 20px;
  background: var(--bg-input);
  color: var(--text-secondary);
  font-size: .85rem;
  white-space: nowrap;
}
.breadcrumb .step.current {
  background: var(--primary);
  color: #fff;
  font-weight: 600;
}
.breadcrumb .arrow {
  color: var(--text-muted);
  font-size: .75rem;
}
.breadcrumb .placeholder {
  color: var(--text-muted);
}

/* Selection panel */
.selection-panel {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.selection-panel .title {
  font-size: .9rem;
  color: var(--text-secondary);
  margin-bottom: 12px;
  font-weight: 500;
}
.selection-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 8px;
}
.selection-item {
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  color: var(--text);
  cursor: pointer;
  font-size: .9rem;
  text-align: center;
  transition: var(--transition);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.selection-item:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  transform: translateY(-1px);
}
.selection-item .emoji { font-size: 1.3rem; }
.selection-item .name { font-weight: 500; }
.selection-item .hint { font-size: .7rem; color: var(--text-muted); }

/* Action buttons */
.actions {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.btn {
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  color: var(--text);
  cursor: pointer;
  font-size: .875rem;
  font-weight: 500;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { background: var(--bg-input); }
.btn.primary {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}
.btn.primary:hover { background: var(--primary-hover); }
.btn.danger { color: var(--danger); }

/* Result card */
.result-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-lg);
  border-left: 4px solid var(--primary);
  animation: slideIn .3s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.result-card .query-text {
  font-size: .8rem;
  color: var(--text-muted);
  margin-bottom: 12px;
  padding: 8px 12px;
  background: var(--bg-input);
  border-radius: var(--radius-sm);
}
.result-card .call-name {
  font-size: 2rem;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 4px;
}
.result-card .call-name .alt {
  font-size: .9rem;
  color: var(--text-muted);
  font-weight: 400;
  margin-left: 8px;
}
.result-card .detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 16px;
}
.detail-item {
  padding: 10px 12px;
  background: var(--bg-input);
  border-radius: var(--radius-sm);
}
.detail-item .key {
  font-size: .75rem;
  color: var(--text-muted);
}
.detail-item .value {
  font-size: .9rem;
  font-weight: 500;
  color: var(--text);
  margin-top: 2px;
}
.closeness-badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: .75rem;
  font-weight: 600;
}
.closeness-1 { background: #e0f7fa; color: #00838f; }
.closeness-2 { background: #e8f5e9; color: #2e7d32; }
.closeness-3 { background: #fff3e0; color: #e65100; }
.closeness-4 { background: #f3e5f5; color: #6a1b9a; }
[data-theme="dark"] .closeness-1 { background: rgba(0,131,143,.3); }
[data-theme="dark"] .closeness-2 { background: rgba(46,125,50,.3); }
[data-theme="dark"] .closeness-3 { background: rgba(230,81,0,.3); }
[data-theme="dark"] .closeness-4 { background: rgba(106,27,154,.3); }

/* Quick reference table */
.ref-table {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.ref-table h3 {
  font-size: 1rem;
  margin-bottom: 12px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 6px;
}
.table-wrapper {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: .85rem;
  min-width: 500px;
}
th, td {
  padding: 10px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
th {
  font-weight: 600;
  color: var(--text-secondary);
  font-size: .8rem;
  background: var(--bg-input);
  position: sticky;
  top: 0;
}
tbody tr:hover { background: var(--bg-input); }
td:first-child { font-weight: 500; white-space: nowrap; }
td:last-child { color: var(--text-secondary); }
.category-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: .7rem;
  font-weight: 600;
  background: var(--primary-light);
  color: var(--primary);
}

/* Footer */
.footer {
  text-align: center;
  padding: 24px 0;
  color: var(--text-muted);
  font-size: .8rem;
}

/* Responsive */
@media (max-width: 480px) {
  .header h1 { font-size: 1.35rem; }
  .selection-grid { grid-template-columns: repeat(2, 1fr); }
  .detail-grid { grid-template-columns: 1fr; }
  .result-card .call-name { font-size: 1.5rem; }
}
</style>
</head>

// ===================== 应用状态 =====================
let userGender = 'male';
let pathStack = [];

// ===================== 速查表渲染 =====================
function renderRefTable() {
  const tbody = document.getElementById('refTableBody');
  tbody.innerHTML = quickReference.map(item => `
    <tr>
      <td>${item.relation}</td>
      <td><strong>${item.call}</strong></td>
      <td><span class="category-tag">${item.type}</span></td>
      <td>${item.note}</td>
    </tr>
  `).join('');
}

// ===================== 性别切换 =====================
function setGender(gender) {
  userGender = gender;
  document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-gender="${gender}"]`).classList.add('active');
  resetAll();
}

// ===================== 获取当前层级节点 =====================
function getCurrentOptions() {
  if (pathStack.length === 0) {
    // 根层级，根据性别过滤
    const options = {};
    for (const [key, node] of Object.entries(kinshipTree)) {
      if (key === '__meta') continue;
      if (node.__meta.requireGender && node.__meta.requireGender !== userGender) continue;
      options[key] = node;
    }
    return options;
  }

  let current = kinshipTree;
  for (const step of pathStack) {
    current = current[step].children;
    if (!current) return null;
  }
  return current;
}

// ===================== 获取当前路径的节点元数据 =====================
function getCurrentNodeMeta() {
  if (pathStack.length === 0) return null;
  let current = kinshipTree;
  for (const step of pathStack) {
    current = current[step].children;
    if (!current) return null;
  }
  // 我们需要找到上一步选择的那个节点的meta
  let meta = kinshipTree;
  for (const step of pathStack) {
    meta = meta[step];
  }
  return meta.children ? meta : null;
}

// ===================== 渲染面包屑 =====================
function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  let html = '<span class="step current">我</span>';
  if (pathStack.length > 0) {
    html += ' <span class="arrow">&#9654;</span> ';
    html += pathStack.map((step, i) => {
      const label = getNodeLabelAtDepth(i);
      const cls = i === pathStack.length - 1 ? 'step current' : 'step';
      return `<span class="${cls}">${label}</span>`;
    }).join(' <span class="arrow">&#9654;</span> ');
  }
  bc.innerHTML = html;
}

function getNodeLabelAtDepth(depth) {
  let current = kinshipTree;
  for (let i = 0; i < depth; i++) {
    current = current[pathStack[i]].children;
  }
  return current[pathStack[depth]].__meta.label || pathStack[depth];
}

// ===================== 渲染选择面板 =====================
function renderSelection() {
  const options = getCurrentOptions();
  const grid = document.getElementById('selectionGrid');
  const title = document.getElementById('selectTitle');

  if (!options || Object.keys(options).length === 0) {
    // 已经到达终点
    grid.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:20px;">已到达关系终点，请查看结果</div>';
    title.textContent = '结果';
    return;
  }

  const levelNum = pathStack.length + 2;
  title.textContent = `${levelNum}. 选择对方的身份关系`;

  grid.innerHTML = Object.entries(options).map(([key, node]) => {
    const meta = node.__meta;
    const emojiMap = {
      '父亲': '👨', '母亲': '👩', '哥哥': '👦', '弟弟': '👦', '姐姐': '👧', '妹妹': '👧',
      '儿子': '👶', '女儿': '👶', '妻子': '👩', '丈夫': '👨',
    };
    const emoji = emojiMap[key] || '👤';
    return `
      <div class="selection-item" onclick="selectOption('${key}')">
        <span class="emoji">${emoji}</span>
        <span class="name">${meta.label}</span>
        ${meta.name ? `<span class="hint">${meta.name}</span>` : ''}
      </div>
    `;
  }).join('');
}

// ===================== 选择选项 =====================
function selectOption(key) {
  const options = getCurrentOptions();
  if (!options) return;

  const node = options[key];
  if (!node) return;

  pathStack.push(key);

  // 检查是否有 children
  if (node.children && Object.keys(node.children).length > 0) {
    renderAll();
  } else {
    // 这是终点
    renderAll();
  }
}

// ===================== 返回上一步 =====================
function goBack() {
  if (pathStack.length === 0) return;
  pathStack.pop();
  renderAll();
}

// ===================== 重新开始 =====================
function resetAll() {
  pathStack = [];
  document.getElementById('resultArea').innerHTML = '';
  renderAll();
}

// ===================== 获取当前结果 =====================
function getCurrentResult() {
  if (pathStack.length === 0) return null;

  let node = kinshipTree;
  for (let i = 0; i < pathStack.length; i++) {
    node = node[pathStack[i]];
  }

  if (node.children && Object.keys(node.children).length > 0) return null;
  return node.__meta;
}

// ===================== 判断是否在叶子节点 =====================
function isAtLeaf() {
  if (pathStack.length === 0) return false;
  const options = getCurrentOptions();
  return options === null || Object.keys(options).length === 0;
}

// ===================== 构建查询文本 =====================
function buildQueryText() {
  if (pathStack.length === 0) return '';
  let parts = ['我'];
  let node = kinshipTree;
  for (const step of pathStack) {
    node = node[step];
    parts.push(node.__meta.label);
  }
  return parts.join('的');
}

// ===================== 渲染结果 =====================
function renderResult() {
  const area = document.getElementById('resultArea');
  if (!isAtLeaf()) {
    area.innerHTML = '';
    return;
  }

  const meta = getCurrentResult();
  if (!meta) return;

  const queryText = buildQueryText();
  let callName = meta.gender_neutral || meta.name || '';
  let ageNote = '';

  if (meta.depends_on_age) {
    if (userGender === 'male') {
      callName = meta.male_older + ' / ' + meta.male_younger;
    } else {
      callName = meta.female_older + ' / ' + meta.female_younger;
    }
    ageNote = '<span class="alt">（视年龄而定）</span>';
  }

  const closenessLabels = { 1: '至亲', 2: '近亲', 3: '一般亲戚', 4: '远亲' };
  const closenessClass = `closeness-${meta.closeness || 3}`;

  area.innerHTML = `
    <div class="result-card">
      <div class="query-text">📝 查询路径：${queryText}</div>
      <div class="call-name">${callName}${ageNote}</div>
      <div class="detail-grid">
        <div class="detail-item">
          <div class="key">关系分类</div>
          <div class="value">${meta.category || '-'}</div>
        </div>
        <div class="detail-item">
          <div class="key">关系类型</div>
          <div class="value">${meta.type === 'direct' ? '直系亲属' : meta.type === 'paternal' ? '父系亲属' : meta.type === 'maternal' ? '母系亲属' : meta.type === 'paternal_cousin' ? '父系堂亲' : meta.type === 'maternal_cousin' ? '母系表亲' : meta.type === 'spouse' ? '配偶关系' : '其他'}</div>
        </div>
        <div class="detail-item">
          <div class="key">亲疏等级</div>
          <div class="value"><span class="closeness-badge ${closenessClass}">${closenessLabels[meta.closeness] || '一般亲戚'}</span></div>
        </div>
        <div class="detail-item">
          <div class="key">补充说明</div>
          <div class="value">${meta.note || meta.name || '标准亲属称谓'}</div>
        </div>
      </div>
    </div>
  `;
}

// ===================== 全面渲染 =====================
function renderAll() {
  renderBreadcrumb();
  renderSelection();
  renderResult();
}

function initTheme() {
  const toggle = document.getElementById('themeToggle');
  const saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  toggle.textContent = saved === 'dark' ? '☀️' : '🌙';

  toggle.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    toggle.textContent = next === 'dark' ? '☀️' : '🌙';
  });
}

// ===================== 初始化 =====================
function init() {
  initTheme();
  renderRefTable();
  renderAll();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
